name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and validate nginx config
        run: |
          docker build -t nginx-test .
          docker run --rm nginx-test nginx -t
