worker_processes auto;

events {
    use epoll;
    multi_accept on;
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    server_tokens      off;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Proxy cache (microcache)
    proxy_cache_path /var/cache/nginx/microcache
                     levels=1:2
                     keys_zone=microcache:10m
                     max_size=100m
                     inactive=10m
                     use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
