upstream pve {
    server pve:8006;   # Tailscale MagicDNS name or 100.x.x.x IP
    keepalive 32;
}

server {
    listen 80;
    server_name pve.lshworkspace.com;   # pick a subdomain, or omit and use IP/port directly

    # Security headers
    include /etc/nginx/snippets/security-headers.conf;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Main proxy to Proxmox VE
    location / {
        proxy_pass https://pve;
        proxy_ssl_verify off;              # PVE uses a self-signed cert by default
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for noVNC console / websocket-based features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Proxmox UI is fully dynamic — no caching
        proxy_buffering off;
        proxy_read_timeout 3600s;   # keep long-lived console sessions alive
        proxy_send_timeout 3600s;
    }
}
