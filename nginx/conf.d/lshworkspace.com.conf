upstream nextjs {
    server nextjs-service:3000;  # K8s service name
    keepalive 32;
}

server {
    listen 80;
    server_name lshworkspace.com www.lshworkspace.com;

    # Security headers
    include /etc/nginx/snippets/security-headers.conf;

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public static files
    location /public/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 1h;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Main proxy to Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Microcache for HTML (1 minute, bypass for authenticated)
        proxy_cache microcache;
        proxy_cache_valid 200 1m;
        proxy_cache_bypass $cookie_session;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
